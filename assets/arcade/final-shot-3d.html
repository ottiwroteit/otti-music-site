<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>MSL ARCADE: FINAL SHOT</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#050508;font-family:'Courier New',monospace;
    user-select:none;-webkit-user-select:none;cursor:none}
  #wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:960px;height:540px}
  #gl,#ui{position:absolute;left:0;top:0;width:960px;height:540px;cursor:none}
  #ui{pointer-events:none}
</style>
</head>
<body>
<div id="wrap"><canvas id="gl" width="960" height="540"></canvas><canvas id="ui" width="960" height="540"></canvas></div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {createEngine,rnd,SFX} from './engine3d.js';

// the frame size lives on the engine (E.W / E.H). Do not redeclare it here: six games
// copying a 960x540 constant is six places for it to drift out of sync with the engine.

// ---- rail: authored spline the camera rides; u in 0..1 loops per stage ----
const RAILS=[
  new THREE.CatmullRomCurve3([              // stage 0: city, weaving between towers
    new THREE.Vector3(0,14,0),   new THREE.Vector3(14,16,-60),
    new THREE.Vector3(-10,12,-130), new THREE.Vector3(8,18,-200),
    new THREE.Vector3(0,15,-280),
  ],false,'catmullrom',0.5),
  new THREE.CatmullRomCurve3([              // stage 1: space, wider and calmer
    new THREE.Vector3(0,0,0),    new THREE.Vector3(-18,6,-70),
    new THREE.Vector3(12,-4,-150), new THREE.Vector3(-6,8,-230),
    new THREE.Vector3(0,0,-300),
  ],false,'catmullrom',0.5),
];

// ---- procedural stage worlds: burning neon city (stage 0), space (stage 1) ----
function buildCity(gp,R,E){
  // OTTI house rule: vibrant, never flat. This is a neon skyline at dusk, not a brown box.
  E.scene.background=new THREE.Color(0x1a0a2e);
  E.scene.fog=new THREE.Fog(0x2a0f3a,70,460);
  gp.add(new THREE.AmbientLight(0xffd0b0,0.9));
  const key=new THREE.DirectionalLight(0xffc070,2.4);key.position.set(-30,60,20);gp.add(key);
  // magenta and cyan rims off the studio palette, so the corridor reads as neon rather than mud
  const rimM=new THREE.PointLight(0xff3d8b,260,260);rimM.position.set(-24,26,-120);gp.add(rimM);
  const rimC=new THREE.PointLight(0x2be0e0,220,260);rimC.position.set(26,20,-220);gp.add(rimC);
  const rimO=new THREE.PointLight(0xff7a20,200,240);rimO.position.set(8,14,-40);gp.add(rimO);
  // ground: wet-street feel, dark but reflective enough to catch the neon
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(400,700),
    new THREE.MeshStandardMaterial({color:0x241436,roughness:.45,metalness:.35}));
  ground.rotation.x=-Math.PI/2;ground.position.set(0,-2,-300);gp.add(ground);
  // towers flanking the rail, lit windows via emissive stripes
  const bodyM=new THREE.MeshStandardMaterial({color:0x191030,roughness:.75,metalness:.2});
  // three window tints cycled per tower so the skyline has colour variety
  const winTints=[0xffb020,0xff3d8b,0x2be0e0].map(c=>{
    const m=new THREE.MeshBasicMaterial({color:c,toneMapped:false});
    m.color.multiplyScalar(0.8);              // bright, but held under the blowout knee
    return m;
  });
  for(let i=0;i<26;i++){
    const side=i%2?1:-1, h=40+R()*90, w=10+R()*10, d=10+R()*10;
    const x=side*(26+R()*40), z=-20-i*22-R()*10;
    const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),bodyM);
    b.position.set(x,h/2-2,z);gp.add(b);
    const wq=new THREE.Mesh(new THREE.PlaneGeometry(w*0.7,h*0.8),winTints[i%3]);
    wq.position.set(x-side*(w/2+0.1),h/2,z);wq.rotation.y=side>0?-Math.PI/2:Math.PI/2;gp.add(wq);
  }
  return gp;
}

function buildSpace(gp,R,E){
  E.scene.background=new THREE.Color(0x02030d);
  E.scene.fog=new THREE.Fog(0x02030d,120,700);
  gp.add(new THREE.AmbientLight(0x88aaff,0.35));
  const sun=new THREE.DirectionalLight(0xffffff,2.0);sun.position.set(40,30,10);gp.add(sun);
  // starfield
  const pos=new Float32Array(1200*3);
  for(let i=0;i<1200;i++){pos[i*3]=(R()-.5)*700;pos[i*3+1]=(R()-.5)*400;pos[i*3+2]=-R()*700;}
  const stars=new THREE.Points(new THREE.BufferGeometry().setAttribute('position',
    new THREE.BufferAttribute(pos,3)),
    new THREE.PointsMaterial({color:0xcfe4ff,size:1.6,sizeAttenuation:false,toneMapped:false}));
  gp.add(stars);
  // planet
  const planet=new THREE.Mesh(new THREE.SphereGeometry(90,32,24),
    new THREE.MeshStandardMaterial({color:0x1d4a80,roughness:.9,emissive:0x0a1c33,emissiveIntensity:1}));
  planet.position.set(-140,40,-420);gp.add(planet);
  // debris the rail threads through
  const dM=new THREE.MeshStandardMaterial({color:0x554b44,roughness:.85});
  for(let i=0;i<40;i++){
    const s=1+R()*4;
    const d=new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),dM);
    d.position.set((R()-.5)*180,(R()-.5)*90,-20-R()*300);
    d.rotation.set(R()*6,R()*6,R()*6);gp.add(d);
  }
  return gp;
}

const KINDS={
  mech   :{hp:2,pts:300,file:'fs-mech',   r:3.2,size:6.0},
  pod    :{hp:1,pts:200,file:'fs-pod',    r:2.2,size:3.4},
  missile:{hp:1,pts:100,file:'fs-missile',r:1.4,size:2.2,harm:true},
  powerB :{hp:1,pts:0,  file:'fs-pod',    r:2.0,size:3.0,power:'bazooka'},
  powerS :{hp:1,pts:0,  file:'fs-pod',    r:2.0,size:3.0,power:'shield'},
};

const E=createEngine({
  gameId:'gundam',
  title:'FINAL SHOT',
  subtitle:'MOBILE SUIT ARCADE',
  tint:'#ffd23d',
  rails:RAILS,
  stages:[buildCity,buildSpace],
  kinds:KINDS,

  onStart(E){G.power=null;G.powerAmmo=0;},
  // new stage, new lap: restart every spawn cadence with the rail
  onNextStage(E){G.waveT=0;G.missileT=0;G.powerT=0;},

  onKill(e,E){
    if(!e.k.power)return false;        // not a pickup: let the engine score and blow it up
    if(e.k.power==='shield')FS.shield=Math.min(8,FS.shield+2); else {G.powerAmmo=5;G.power='bazooka';}
    SFX.power();
    return true;
  },
  damage(hit,E){
    const dmg=(G.power==='bazooka'&&G.powerAmmo>0)?3:1;
    if(G.power==='bazooka'&&G.powerAmmo>0){G.powerAmmo--;if(G.powerAmmo<=0)G.power=null;}
    return dmg;
  },

  entityUpdate(e,dt,E){
    if(e.kind==='mech')e.obj.position.y=e.baseY+Math.sin(e.t*2)*0.35;  // hover bob about the spawn height, not a drift
    e.obj.lookAt(E.camera.position);                                // face first, then layer motion on top
    if(e.kind==='pod')e.obj.rotation.z+=Math.sin(e.t*3)*0.25;       // banking
    if(e.spin)e.obj.rotation.y+=Math.sin(e.t*e.spin)*0.4;
  },

  spawnTick(E,dt){
    // spawns need lead time ahead of the camera; near the end of a lap there is none,
    // and the camera teleports back to the start, so suppress spawning in that window
    const u=E.railU(), canSpawn=u<0.84;
    const ahead=()=>E.railPos(u+0.14,new THREE.Vector3());
    // every cadence below is in SECONDS, on the same clock as the rail. Frame-counted
    // cadence desynced from the time-driven camera and made run length scale with refresh rate.
    G.waveT+=dt;G.missileT+=dt;G.powerT+=dt;
    const waveEvery=Math.max(0.5,(70-FS.stage*10)/60);
    if(canSpawn&&G.waveT>=waveEvery){
      G.waveT=0;
      const p=ahead(), side=Math.random()<.5?-1:1;
      if(Math.random()<.6)E.spawn('mech',{at:p.clone().add(new THREE.Vector3(side*rnd(6,18),rnd(-4,6),0))});
      else E.spawn('pod',{at:p.clone().add(new THREE.Vector3(side*30,rnd(2,14),0)),
        vel:new THREE.Vector3(-side*14,0,6),spin:0.6});
    }
    if(canSpawn&&G.missileT>=2.5){
      G.missileT=0;
      const p=ahead();
      const v=E.camera.position.clone().sub(p).normalize().multiplyScalar(26);
      E.spawn('missile',{at:p,vel:v});
    }
    if(canSpawn&&G.powerT>=10){
      G.powerT=0;
      const p=ahead();
      E.spawn(Math.random()<.5?'powerB':'powerS',{at:p.clone().add(new THREE.Vector3(0,8,0)),
        vel:new THREE.Vector3(0,0,10),spin:1.4});
    }
  },

  hud(E){
    const ui=E.ui;
    E.clearHUD();
    // top bar
    E.drawTopBar();
    // shield pips
    for(let i=0;i<8;i++){
      ui.fillStyle=i<FS.shield?'#39c463':'rgba(255,255,255,.12)';
      ui.beginPath();ui.roundRect(E.W-30-i*16,E.H-24,12,12,3);ui.fill();
    }
    if(G.power==='bazooka')E.txt('BAZOOKA x'+G.powerAmmo,14,E.H-16,15,'#ff7a1a','left');
    // stage banner
    E.drawBanner();
    // crosshair
    E.drawCrosshair();
    // modal screens
    E.drawAttract();
    E.drawGameOver();
  },
});

// FS is the engine's own state (mode, t, stage, score, shield). G is the namespaced bag the
// engine reserves for the game, so a future engine field can never collide with a game field.
const FS=E.state, G=FS.game;
G.waveT=0;G.missileT=0;G.powerT=0;G.power=null;G.powerAmmo=0;

E.start();   // builds stage 0, installs the six window.__arc* hooks, starts the rAF loop

if(location.hash==='#selftest')(async()=>{
  const A=(c,m)=>{if(!c)throw new Error('FAIL: '+m);};
  A(typeof window.__arcStep==='function','__arcStep exists');
  A(typeof window.__arcShoot==='function','__arcShoot exists');
  A(typeof window.__arcEnts==='function','__arcEnts exists');
  A(typeof window.__arcStop==='function','__arcStop exists');
  A(window.__arcGame==='gundam','__arcGame is gundam');
  A(FS.mode==='attract','starts in attract');
  A(typeof E.toGame==='function','toGame is exported for extra pointer handlers');
  A(FS.game&&typeof FS.game==='object','state.game namespace exists');
  A(E.W===960&&E.H===540,'engine owns the frame size');
  const p=E.railPos(0,new THREE.Vector3()), p2=E.railPos(0.5,new THREE.Vector3());
  A(p.distanceTo(p2)>1,'rail actually travels');
  FS.start();
  A(FS.mode==='play'&&FS.shield===6&&FS.score===0,'start resets state');
  window.__arcStep(10,0.016);
  A(FS.t>0.1,'stepping advances time');
  A(E.getStageGroup()&&E.getStageGroup().children.length>10,'stage 0 built with content');
  const n0=E.getStageGroup().children.length;
  E.buildStage(1);
  A(E.getStageGroup().children.length>0,'stage 1 built');
  A(E.getStageGroup()!==null,'stage group replaced not leaked');
  E.buildStage(0);
  A(Math.abs(E.getStageGroup().children.length-n0)<2,'stage 0 rebuilds deterministically');

  // wait for the enemy clone pool so spawn has something to hand out
  await new Promise(r=>{const w=()=>(E.pool['fs-mech']&&E.pool['fs-mech'].length)?r():setTimeout(w,50);w();});
  FS.start();
  const before=FS.score;
  const e=E.spawn('mech',{at:new THREE.Vector3(0,12,-40)});
  A(e&&FS.ents.length===1,'spawn adds an entity');
  window.__arcStep(2,0.016);
  A(e.sx>=0&&e.sx<=E.W,'entity projects into screen space');
  A(E.hitTest(e.sx,e.sy)===e,'hitTest finds it at its own screen position');
  A(E.hitTest(5,5)===null,'hitTest misses far away');
  E.killEnt(e);E.killEnt(e);          // double-kill must not double-score
  A(FS.score===before+300,'kill scores exactly once');
  A(window.__arcEnts().length===0,'dead entities leave __arcEnts');
  FS.ents.length=0;

  const fxBefore=E.fxCount();
  E.boom(new THREE.Vector3(0,10,-30));
  A(E.fxCount()>fxBefore,'boom emits particles');
  E.spark(new THREE.Vector3(0,10,-30));
  A(typeof E.drawHUD==='function','drawHUD defined');
  FS.mode='over';E.drawHUD();FS.mode='attract';E.drawHUD();FS.mode='play';E.drawHUD();

  window.__selftest='OK';
  console.log('SELFTEST OK');
})().catch(err=>{window.__selftest=String(err&&err.message||err);console.error(err);});
</script>
</body>
</html>
