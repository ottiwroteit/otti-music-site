<!doctype html>
<html lang="en">
<head>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<style>
  :root{
    --neon-green:#8dff1a; --magenta:#ff2fb0; --cyan:#2be0e0; --amber:#ffb020;
    --mono:'DM Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#060309;overscroll-behavior:none}
  body{position:fixed;inset:0;width:100%;touch-action:none;
    font-family:var(--mono);color:#f5f0ff;-webkit-font-smoothing:antialiased}
  #scene{position:fixed;inset:0}
  canvas{display:block}

  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;
    justify-content:space-between;gap:10px;padding:14px 18px;pointer-events:none}
  header>*{pointer-events:auto}
  .livepill{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.06em;
    color:#e8e2f4;text-transform:uppercase;font-weight:500;white-space:nowrap;
    background:rgba(6,3,9,.55);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 12px;backdrop-filter:blur(6px)}
  .livepill .brand{font-family:'Bungee',sans-serif;font-size:12px;color:#fff;margin-right:2px}
  .livepill .brand b{color:var(--neon-green)}
  .livepill .live{color:#fff;background:var(--magenta);padding:1px 6px;border-radius:4px;font-weight:600;
    box-shadow:0 0 12px rgba(255,47,176,.7);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .cta{font-family:var(--mono);font-weight:500;font-size:12px;color:#08110a;background:var(--neon-green);
    border:none;border-radius:999px;padding:9px 16px;cursor:pointer;white-space:nowrap;letter-spacing:.04em;
    box-shadow:0 0 18px rgba(141,255,26,.5)}
  .cta:hover{box-shadow:0 0 28px rgba(141,255,26,.8)}

  .hint{position:fixed;bottom:12px;left:0;right:0;z-index:10;text-align:center;font-size:10.5px;
    letter-spacing:.06em;color:#a99ec6;text-shadow:0 1px 4px #000;pointer-events:none}
  .hint kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;
    padding:0 5px;color:#fff}
  #daynight{position:fixed;top:54px;right:18px;z-index:11;display:flex;align-items:center;gap:7px;
    background:rgba(6,3,9,.55);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 10px;
    backdrop-filter:blur(6px);cursor:pointer;font-size:13px;line-height:1}
  #daynight .dn-sun{color:#ffd27a}#daynight .dn-moon{color:#9fb4ff;opacity:.5}
  #daynight.night .dn-sun{opacity:.5}#daynight.night .dn-moon{opacity:1}
  #daynight .dn-track{position:relative;width:30px;height:15px;border-radius:999px;
    background:linear-gradient(90deg,#c9772e,#3a2a5a);border:1px solid rgba(255,255,255,.15)}
  #daynight .dn-knob{position:absolute;top:1px;left:1px;width:11px;height:11px;border-radius:50%;
    background:var(--neon-green);box-shadow:0 0 8px rgba(141,255,26,.7);transition:left .55s cubic-bezier(.4,1.2,.5,1)}
  #daynight.night .dn-knob{left:16px}

  #playbtn{position:fixed;left:50%;bottom:46px;transform:translateX(-50%);z-index:11;
    font-family:'Bungee',sans-serif;font-size:15px;color:#08110a;background:var(--neon-green);
    border:none;border-radius:999px;padding:13px 30px;cursor:pointer;letter-spacing:.05em;
    box-shadow:0 0 26px rgba(141,255,26,.6)}
  #playbtn.hidden{display:none}
  #backchip{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);z-index:11;display:none;
    font-family:var(--mono);font-size:12px;color:#ddd;background:rgba(10,8,14,.75);
    border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:8px 16px;cursor:pointer;
    backdrop-filter:blur(4px);letter-spacing:.04em}
  #backchip.show{display:block}
  #backchip kbd{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:4px;padding:0 5px}
  /* live web app on the earth-horizon monitor — positioned over its projected screen rect */
  #screenframe,#mpcframe,#arcframe{position:fixed;z-index:9;border:0;background:#000;opacity:0;pointer-events:none;
    transition:opacity .25s ease;box-shadow:0 0 40px rgba(0,0,0,.6)}
  #mpcframe{background:#0a0404;border-radius:14px;box-shadow:0 0 60px rgba(200,20,20,.35),0 20px 60px rgba(0,0,0,.7)}
  #arcframe{background:#050508;border-radius:12px;box-shadow:0 0 60px rgba(60,140,255,.25),0 20px 60px rgba(0,0,0,.75)}
  #screenframe.show,#mpcframe.show,#arcframe.show{opacity:1;pointer-events:auto}
  body.in-screen #playbtn,body.in-screen .hint{display:none}
  #arcchip{position:fixed;left:18px;top:72px;z-index:11;display:none;   /* top-left, OUT of the flipper tap zones */
    font-family:var(--mono);font-size:12px;color:#dffcff;background:rgba(10,8,14,.75);
    border:1px solid rgba(102,183,255,.45);border-radius:999px;padding:9px 15px;cursor:pointer;
    backdrop-filter:blur(4px);letter-spacing:.06em;box-shadow:0 0 18px rgba(102,183,255,.25)}
  #arcchip.show{display:block}
  @media (max-width:520px){ .livepill{font-size:9px;padding:5px 9px;gap:5px} .livepill .brand{font-size:10px} .cta{font-size:10px;padding:8px 11px} }
</style>

<body>
<div id="scene"></div>

<header>
  <div class="livepill"><span class="brand">MSL<b>.</b></span><span id="clock">—</span><span class="live">LIVE</span></div>
  <button class="cta">EARLY ACCESS</button>
</header>
<button id="daynight" class="night" aria-label="Toggle sunrise and sunset view"><span class="dn-sun">&#9728;</span><span class="dn-track"><span class="dn-knob"></span></span><span class="dn-moon">&#9790;</span></button>

<button id="playbtn">PLAY</button>
<button id="backchip">Go Back <kbd>ESC</kbd></button>
<iframe id="screenframe" title="Y2K Desktop OS" loading="lazy"></iframe>
<iframe id="mpcframe" title="OTTI MPC2000XL" loading="lazy" allow="autoplay"></iframe>
<iframe id="arcframe" title="OTTI ARCADE" loading="lazy" allow="autoplay"></iframe>
<button id="arcchip">&#9664; ARCADE</button>
<div class="hint"><kbd>&larr;</kbd><kbd>&rarr;</kbd> flippers · <kbd>Space</kbd> launch · mobile: tap sides</div>

<script>
/* ================================================================
   2D PHYSICS (matter.js) — drives the 3D table. Coordinates: 440x720,
   y down, (0,0) top-left = far-left corner of playfield near backglass.
   ================================================================ */
const { Engine, Bodies, Body, Composite, Constraint, Events } = Matter;
const PW = 440, PH = 720;
const engine = Engine.create();
engine.gravity.y = 1.05;
const world = engine.world;
const laneX = PW - 46;

const statics = [];
function wall(x,y,w,h,angle=0){const b=Bodies.rectangle(x,y,w,h,{isStatic:true,restitution:.4,friction:.02});
  if(angle)Body.setAngle(b,angle); statics.push(b); return b;}
wall(PW/2,-10,PW,20); wall(-10,PH/2,20,PH); wall(PW+10,PH/2,20,PH);
wall(laneX-11,430,8,580);                    // plunger divider — top open (y<140) so the launch exits left
wall(laneX+11,PH-55,54,10);                  // lane floor — the ball rests on the plunger, never leaks out
wall(70,120,150,10,0.5); wall(320,95,120,10,-0.45);         // arch shoulders (right one high — no rest pocket vs pedestal)
wall(410,45,92,10,0.71);                                    // top-right corner deflector — curves launch onto playfield
wall(70,PH-190,150,10,0.62); wall(PW-131,PH-190,150,10,-0.62); // outlanes (right one ends at the lane divider)
wall(120,PH-120,10,90,0.30); wall(PW-166,PH-120,10,90,-0.30);

const bumpers2d = [];
function bumper(x,y,r){const b=Bodies.circle(x,y,r,{isStatic:true,restitution:1.7});
  b.isBumper=true; bumpers2d.push(b); statics.push(b); return b;}
bumper(PW*0.26,300,24); bumper(PW*0.66,270,24); bumper(PW*0.46,380,27);
bumper(PW*0.72,420,20); bumper(PW*0.22,440,20);
// globe pedestal — big static circle top-center the ball caroms off
const pedestal2d = Bodies.circle(PW*0.46,175,52,{isStatic:true,restitution:1.2});
pedestal2d.isBumper=true; statics.push(pedestal2d);
function sling(x,y,a){const b=Bodies.rectangle(x,y,70,14,{isStatic:true,restitution:1.9,angle:a});
  b.isBumper=true; statics.push(b); return b;}
sling(96,PH-215,0.62); sling(PW-142,PH-215,-0.62);
// drop-target bank (left mid) — 3 standing targets, each scores
const dropTargets=[58,88,118].map(x=>{
  const t=Bodies.rectangle(x,385,26,8,{isStatic:true,restitution:1.2});
  t.isBumper=true; statics.push(t); return t;
});
Composite.add(world, statics);

function makeFlipper(px,py,dir){
  const len=72,h=20;   // tips leave a ~32px center gap — ball (22px) drains clean, no tip-wedge
  const f=Bodies.rectangle(px+dir*len/2,py,len,h,{density:.02,restitution:.2,friction:.1,
    collisionFilter:{category:0x0004,mask:0x0002}}); // flippers touch ONLY the ball — never rest on scenery
  Composite.add(world,[f,Constraint.create({pointA:{x:px,y:py},bodyB:f,pointB:{x:-dir*len/2,y:0},stiffness:1,length:0})]);
  const rest=dir>0?0.28:-0.28, up=dir>0?-0.5:0.5;
  Body.setAngle(f,rest);
  return {body:f,dir,rest,up,pressed:false,px,py,len,h};
}
const flipY = PH-150;
const leftFlip=makeFlipper(112,flipY,1), rightFlip=makeFlipper(PW-158,flipY,-1);
function driveFlipper(f){
  Body.setAngularVelocity(f.body,((f.pressed?f.up:f.rest)-f.body.angle)*0.9);
  // ponytail: direct strike impulse — constraint solver can't transfer a 1.5-tick swing
  if(f.pressed&&!f._did&&ball2d){
    const dx=(ball2d.position.x-f.px)*f.dir, dy=ball2d.position.y-f.py;
    if(dx>-8&&dx<f.len+16&&dy>-46&&dy<20){
      const lev=Math.max(.3,Math.min(dx/f.len,1));
      Body.setVelocity(ball2d,{x:ball2d.velocity.x*.4+f.dir*5,y:Math.min(ball2d.velocity.y,-(11+9*lev))});
      f._did=true;
    }
  }
  if(!f.pressed)f._did=false;
}

let ball2d=null;
function spawnBall(){
  if(ball2d)Composite.remove(world,ball2d);
  ball2d=Bodies.circle(laneX+11,PH-90,11,{restitution:.35,friction:.005,density:.02,
    collisionFilter:{category:0x0002}});
  Composite.add(world,ball2d); game.launched=false; game.charge=0;
}
function launchBall(p){if(!ball2d||game.launched)return;Body.setVelocity(ball2d,{x:0,y:-p});game.launched=true;ledFlash('GAME START');}

/* ================================================================
   GAME STATE + MOCK LIVE DATA STREAM
   ================================================================ */
const game={state:'idle',score:0,balls:3,launched:false,charging:false,charge:0,attract:true,_aw:1.5,_stall:0};
const fmt=n=>n.toLocaleString('en-US');
const stats={fans:2334667,plays:24500,listeners:41000000};
let ledMsg='PRESS PLAY', ledHold=0;
function ledFlash(t,hold=90){ledMsg=t;ledHold=hold;}
const idleMsgs=['PRESS PLAY','TO BE QUITE HONEST','MOVE SOMETHING','FEEL SOMETHING'];
let idleIdx=0;
const bumpMsgs=['SHIP IT','BOOM','NICE','+500','OTTI','LEVEL UP'];

// ponytail: mock stream, not a real WebSocket — same event shape, swap later
const CITIES=[[40.7,-74],[51.5,-.1],[35.7,139.7],[-23.5,-46.6],[52.5,13.4],[19.4,-99.1],
  [1.35,103.8],[48.9,2.3],[-33.9,151.2],[34.05,-118.2],[6.5,3.4],[55.7,37.6]];
const logLines=[];
const txListeners=[];
function fireTx(){
  const a=CITIES[Math.random()*CITIES.length|0]; let b=CITIES[Math.random()*CITIES.length|0];
  if(b===a)b=CITIES[(CITIES.indexOf(a)+3)%CITIES.length];
  const n=8+(Math.random()*180|0);   // streams in this burst — no money anywhere
  stats.fans+=n; stats.plays+=1+(Math.random()*3|0); stats.listeners+=10+(Math.random()*400|0);
  const d=new Date();
  logLines.push(`[${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}] play_${(Math.random()*9e4|0)} +${n} streams · ok`);
  if(logLines.length>14)logLines.shift();
  txListeners.forEach(fn=>fn(a,b));
}
setInterval(fireTx,260);

Events.on(engine,'collisionStart',ev=>{
  for(const p of ev.pairs){
    const o=p.bodyA.isBumper?p.bodyA:p.bodyB.isBumper?p.bodyB:null;
    if(o&&(p.bodyA===ball2d||p.bodyB===ball2d)){
      if(!game.attract)game.score+=500; o._glow=1;
      ledFlash(bumpMsgs[Math.random()*bumpMsgs.length|0],40);
      flashLight.intensity=7;
    }
  }
});
function drain(){
  game.balls--; ledFlash('SEE YA!',70);
  if(game.balls<=0){game.state='over';ledFlash('GAME OVER',9999);playbtn.textContent='PLAY AGAIN';playbtn.classList.remove('hidden');
    setTimeout(()=>{if(game.state==='over'){game.attract=true;game._aw=1.5;}},4000);}  // machine resumes playing itself
  else setTimeout(spawnBall,600);
}
function startGame(){game.state='playing';game.attract=false;game.score=0;game.balls=3;playbtn.classList.add('hidden');ledFlash('GAME START');spawnBall();}

/* ---- clock (GMT, ticking) ---- */
const clockEl=document.getElementById('clock');
function tickClock(){const d=new Date(),p=n=>String(n).padStart(2,'0');
  const day=d.toLocaleDateString('en-US',{weekday:'short',timeZone:'UTC'}).toUpperCase();
  const mon=d.toLocaleDateString('en-US',{month:'short',timeZone:'UTC'}).toUpperCase();
  clockEl.textContent=innerWidth<520
    ? `${day} ${p(d.getUTCDate())} · ${p(d.getUTCHours())}:${p(d.getUTCMinutes())} GMT`
    : `${day} ${mon} ${p(d.getUTCDate())} · ${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())} GMT`;}
setInterval(tickClock,1000);tickClock();

/* ---- input ---- */
const playbtn=document.getElementById('playbtn');
playbtn.addEventListener('click',startGame);
addEventListener('keydown',e=>{
  if([' ','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')leftFlip.pressed=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')rightFlip.pressed=true;
  if(e.key===' '){ if(game.state!=='playing')startGame(); else if(!game.launched)game.charging=true; }
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')leftFlip.pressed=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')rightFlip.pressed=false;
  if(e.key===' '&&game.charging){launchBall(18+game.charge*0.10);game.charging=false;game.charge=0;}
});
addEventListener('pointerdown',e=>{
  if(window.__inScreen)return;              // focused on the Y2K monitor — no pinball input
  if(e.target.closest('button,header'))return;
  if(game.state!=='playing')return;
  if(!game.launched){launchBall(24);return;}
  (e.clientX<innerWidth/2?leftFlip:rightFlip).pressed=true;
});
addEventListener('pointerup',()=>{leftFlip.pressed=false;rightFlip.pressed=false;});
</script>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {RoomEnvironment} from 'three/addons/environments/RoomEnvironment.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {OutputPass} from 'three/addons/postprocessing/OutputPass.js';

/* ================================================================
   RENDERER / SCENE / CAMERA
   ================================================================ */
const container=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x060309);
scene.fog=new THREE.Fog(0x060309,9,20);
// environment map — makes metal/plastic/glass materials actually respond
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
scene.environmentIntensity=0.3;   // reflections yes, gray wash no
pmrem.dispose();

const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,.1,60);
function frameCamera(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
frameCamera();

/* ---- camera choreography: wide / table / globe states, damped fly-to ---- */
const CAMS={
  wide: {pos:[0.3,3.4,5.15], look:[0,0.22,-0.42], fov:47, ppos:[0,3.55,5.7], plook:[0,0.46,-0.42], pfov:63},
  table:{pos:[0.15,3.0,3.15],look:[0,0.0,-0.3], fov:46, ppos:[0,3.25,3.5],plook:[0,-0.05,-0.3],pfov:60},
  arcade:{pos:[-4.9,1.9,3.6], look:[-9.6,0.5,-1.8], fov:52, ppos:[-4.2,2.3,4.8], plook:[-9.6,0.8,-1.8], pfov:68}, // warehouse wing, left of the studio
};
let camState='wide';
const camCur={pos:new THREE.Vector3(),look:new THREE.Vector3(),fov:46};
const _gw=new THREE.Vector3();
const _sq=new THREE.Quaternion(),_sn=new THREE.Vector3();
function camTarget(){
  const portrait=innerHeight>innerWidth;
  if(camState==='globe'){
    globe.getWorldPosition(_gw);
    return {pos:_gw.clone().add(new THREE.Vector3(portrait?0.12:0.55,0.3,portrait?1.5:1.1)),
            look:_gw.clone().add(new THREE.Vector3(0,0.03,0)),fov:portrait?56:42};
  }
  if(camState==='screen'){ // head-on at the Y2K OS monitor, along its normal
    emScreen.getWorldPosition(_gw);
    emScreen.getWorldQuaternion(_sq);
    _sn.set(0,0,1).applyQuaternion(_sq);
    const dist=portrait?2.7:1.35, fov=portrait?62:40;
    return {pos:_gw.clone().addScaledVector(_sn,dist),look:_gw.clone(),fov};
  }
  if(camState==='mpc'&&(curMpc||mpcUnits[0])){ // head-on at the clicked machine's panel
    if(!curMpc)curMpc=mpcUnits[0];
    curMpc.face.getWorldPosition(_gw);
    curMpc.face.getWorldQuaternion(_sq);
    _sn.set(0,0,1).applyQuaternion(_sq);
    const dist=portrait?2.05:1.15, fov=portrait?60:42;
    return {pos:_gw.clone().addScaledVector(_sn,dist),look:_gw.clone(),fov};
  }
  if(camState==='arc'&&(curArc||arcUnits[0])){ // head-on at the clicked arcade cabinet's screen
    if(!curArc)curArc=arcUnits[0];
    curArc.face.getWorldPosition(_gw);
    curArc.face.getWorldQuaternion(_sq);
    _sn.set(0,0,1).applyQuaternion(_sq);
    const dist=portrait?2.3:1.25, fov=portrait?58:42;
    return {pos:_gw.clone().addScaledVector(_sn,dist),look:_gw.clone(),fov};
  }
  const c=CAMS[camState]||CAMS.wide;   // unknown/unready state never crashes the loop
  return portrait
    ? {pos:new THREE.Vector3(...c.ppos),look:new THREE.Vector3(...c.plook),fov:c.pfov}
    : {pos:new THREE.Vector3(...c.pos), look:new THREE.Vector3(...c.look), fov:c.fov};
}
const backchip=document.getElementById('backchip');
const arcchip=document.getElementById('arcchip');
const screenframe=document.getElementById('screenframe');
const mpcframe=document.getElementById('mpcframe');
const arcframe=document.getElementById('arcframe');
const focusStates=['globe','screen','mpc','arc'];
window.__mpcExit=()=>setCam('wide');    // the MPC app calls this on ESC
window.__arcExit=()=>setCam('arcade');  // an arcade game calls this on ESC -> back to the wing
function backTarget(){return camState==='globe'?'table':camState==='arc'?'arcade':'wide';}
function setCam(s){
  camState=s;
  backchip.classList.toggle('show',focusStates.includes(s)||s==='arcade');
  arcchip.classList.toggle('show',s==='wide'||s==='table');
  window.__inScreen=(s==='screen'||s==='mpc'||s==='arc'||s==='arcade'); // pinball input guard (classic script reads this)
  document.body.classList.toggle('in-screen',s==='screen'||s==='mpc'||s==='arc'||s==='arcade');
  if(s==='screen'){ if(!screenframe.src)screenframe.src='assets/y2k-os/index.html'; }
  else screenframe.classList.remove('show');
  if(s==='mpc'){
    if(!curMpc)curMpc=mpcUnits[0];   // same fallback camTarget() uses, so the iframe src always gets set
    if(curMpc){
      const want='assets/mpc/index.html#'+curMpc.song;
      if(!mpcframe.getAttribute('src'))mpcframe.src=want;   // attribute, not resolved .src
      else try{mpcframe.contentWindow.location.hash=curMpc.song;}catch(_){mpcframe.src=want;}
      try{mpcframe.contentWindow.focus();}catch(_){}   // re-entry: hand keyboard back to the pads (app focuses itself on first load)

  ns.clearRect(0,0,760,640);

    // key the near-black backdrop out via a soft luminance ramp — keeps the chrome, lets the
    // bright metal edges glow in the dark room (the logo PNG is opaque, so we make our own alpha)
    const t=document.createElement('canvas');t.width=t.height=512;
    const tc=t.getContext('2d');
    tc.drawImage(img,0,0,512,512);
    const id=tc.getImageData(0,0,512,512),d=id.data;
    for(let i=0;i<d.length;i+=4){
      const lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      d[i+3]=Math.max(0,Math.min(255,(lum-8)/(30-8)*255));   // <8 transparent, >30 opaque
    }
    tc.putImageData(id,0,0);
    ns.shadowColor='#cfe4ff';ns.shadowBlur=34;               // cool metallic glow, not green
    ns.drawImage(t,124,96,512,512);
    ns.drawImage(t,124,96,512,512);                           // double pass = hotter core (dropped so the top clears frame)
  }
  nsTex.needsUpdate=true;
}

      c.material.emissiveIntensity=0;          // generated GLBs sometimes ship hot emissives

      if(name==='warmachine'){c.material.envMapIntensity=1.3;c.material.metalness=Math.max(c.material.metalness??.5,.7);} // metallic armor catches the neon rim light
      window._propsLoaded.push(name+':'+(c.material.map?'tex':'NOTEX'));

      o.updateMatrixWorld(true);
      const wb=new THREE.Box3().setFromObject(o), wc=wb.getCenter(new THREE.Vector3());
      const face=new THREE.Mesh(new THREE.PlaneGeometry(MPC_FW,MPC_FH),
        new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
      face.position.set(wc.x, wb.max.y+0.34, wb.max.z+0.22);
      face.rotation.set(-0.32, deskLG.rotation.y, 0);   // tilt back a touch, yaw with the desk
      scene.add(face);
      mpcUnits.push({song:MPC_SONG[name],obj:o,face});
      window._mpcUnits=mpcUnits;
    }
  },undefined,()=>{});
});

/* AI-generated floor rugs (assets/rugs/*.png, die-cut alpha) — flat on the floor for depth */
const rugTexL=new THREE.TextureLoader();
const rugMats=[];   // collected for the animated shimmer in the main loop
const RUG_LIST=[
  // [file, x, z, width(world units), rotZ]
  ['swordswoman', -0.15, 1.45, 1.45, 0.12],
  ['barry',        1.25, 1.75, 1.75, -0.15],
];
RUG_LIST.forEach(([name,x,z,w,rz])=>{
  rugTexL.load(`assets/rugs/${name}.png`,tex=>{
    tex.colorSpace=THREE.SRGBColorSpace;tex.anisotropy=8;
    const ar=tex.image.height/tex.image.width;             // portrait cutouts
    const m=new THREE.MeshStandardMaterial({map:tex,transparent:true,alphaTest:0.5,
      roughness:.95,emissive:0xffffff,emissiveMap:tex,emissiveIntensity:0.3,side:THREE.DoubleSide});
    const rug=new THREE.Mesh(new THREE.PlaneGeometry(w,w*ar),m);
    rug.rotation.set(-Math.PI/2,0,rz);                      // lay flat, spin in the floor plane
    rug.position.set(x,floor.position.y+0.012,z);          // hover just above the floor (no z-fight)
    scene.add(rug);
    rugMats.push(m);
    window._rugsLoaded=(window._rugsLoaded||[]);window._rugsLoaded.push(name);
  },undefined,()=>{});
});

/* ================================================================
   BLOOM — single global pass; neon carried by material hierarchy.
   #nobloom = no-post baseline (acceptance gate).
   ================================================================ */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.7,0.4,0.75);
if(location.hash!=='#nobloom')composer.addPass(bloom);
composer.addPass(new OutputPass());

addEventListener('resize',()=>{
  frameCamera();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

/* mouse parallax */
let mx=0,my=0;
addEventListener('pointermove',e=>{mx=(e.clientX/innerWidth-.5);my=(e.clientY/innerHeight-.5);});

/* redraw art once fonts are in */
drawPlayfield();drawBackglass();
document.fonts.ready.then(()=>{drawPlayfield();drawBackglass();});

/* ================================================================
   MAIN LOOP — physics + sync + textures + render
   ================================================================ */
window.rinfo=renderer.info;  // diagnostics
window._camera=camera;
window._dbg=()=>({state:camState,camPos:camera.position.toArray().map(v=>+v.toFixed(2)),
  target:camTarget().pos.toArray().map(v=>+v.toFixed(2)),
  earthLoaded:earthImg.complete&&earthImg.naturalWidth>0});
const clock3=new THREE.Clock();
let tmAccum=0;
function loop(){
  requestAnimationFrame(loop);
  try{loopBody();}catch(e){window.__loopErr=(e&&e.stack)||String(e);throw e;}
}
window.__step=()=>loopBody();   // manual frame driver (headless verification)
function loopBody(){
  const dt=Math.min(clock3.getDelta(),0.033);

  // animated rugs — gentle emissive shimmer so they feel alive
  if(rugMats.length){const et=clock3.elapsedTime;for(let i=0;i<rugMats.length;i++)rugMats[i].emissiveIntensity=0.26+0.12*Math.sin(et*1.4+i*1.7);}

  // downtown window — mouse parallax (splat-like depth) + sunrise/sunset crossfade
  skyU.uPar.value.set(mx*0.03,my*0.018);
  skyMix+=(skyTarget-skyMix)*0.05;skyU.uMix.value=skyMix;

  // attract mode — auto launch/respawn only; flippers move ONLY on user input
  game._aw-=dt;
  if(game.attract&&game.state!=='playing'){
    if(!ball2d||ball2d.position.y>PH+30){spawnBall();game._aw=1.4;}
    else if(!game.launched&&game._aw<=0){launchBall(22+Math.random()*4);}
  }

  // physics — flipper spring recomputed EVERY substep (once-per-frame + multi
  // substep double-applies the velocity -> overshoot -> flippers flap on their own)
  if(game.charging&&game.charge<100)game.charge+=130*dt;
  for(let ms=dt*1000;ms>0;ms-=1000/60){
    driveFlipper(leftFlip);driveFlipper(rightFlip);
    Engine.update(engine,Math.min(1000/60,ms));
  }
  if(game.state==='playing'&&game.launched&&ball2d&&ball2d.position.y>PH+30){game.launched=false;drain();}
  // weak plunge: ball settles back in the lane -> allow re-launch
  if(ball2d&&game.launched&&ball2d.position.x>laneX-11&&ball2d.position.y>PH-200&&ball2d.speed<0.3){
    game.launched=false;game._aw=0.8;}
  // anti-stall: a resting ball gets a nudge (no dead pockets)
  if(game.launched&&ball2d){
    if(ball2d.speed<0.4){if(++game._stall>90){Body.applyForce(ball2d,ball2d.position,{x:(Math.random()-.5)*.02,y:.012});game._stall=0;}}
    else game._stall=0;
  }

  // LED idle messages
  if(ledHold>0)ledHold--;
  else if(game.state!=='playing'){idleIdx=(idleIdx+1)%idleMsgs.length;ledFlash(idleMsgs[idleIdx],150);}
  else ledMsg='SCORE';

  // sync 3D from physics
  if(ball2d){ballMesh.visible=true;
    ballMesh.position.set(mapX(ball2d.position.x),11*S,mapZ(ball2d.position.y));}
  else ballMesh.visible=false;
  leftFlipM.rotation.y=-leftFlip.body.angle;
  rightFlipM.rotation.y=-rightFlip.body.angle;
  for(const g of bumperMeshes){
    const b=g.userData.body;
    if(b._glow>0){
      g.userData.capM.emissiveIntensity=.3+b._glow*3.5;
      if(g.userData.ringM)g.userData.ringM.emissiveIntensity=1.4+b._glow*4;
      b._glow*=.88;
      flashLight.position.set(g.position.x,0.4,g.position.z+0.2);
    }
  }
  flashLight.intensity=Math.max(0,flashLight.intensity-dt*28);

  // ramp pulses — comet heads with trailing dots along the wireform
  for(const p of pulses){
    if(p.t<0)continue;
    p.t+=dt*0.5;
    if(p.t>=1){p.t=-1;p.grp.visible=false;continue;}
    p.grp.children.forEach((head,i)=>{
      const tt=Math.max(0,p.t-i*0.022);
      const pt=rampCurve.getPoint(tt);
      head.position.set(pt.x,pt.y+.012,pt.z);
      head.material.opacity=(1-p.t*0.5)*(1-i*0.2);
    });
  }

  // lava lamp blobs — slow rise and fall inside the glass
  {const lt=clock3.elapsedTime;
   for(const b of lavaBlobs){
     const u=(Math.sin(lt*b.userData.sp+b.userData.ph)+1)/2;   // 0..1
     b.position.y=.13+u*.24;
     const s=.8+Math.sin(lt*.9+b.userData.ph*2)*.25;
     b.scale.set(s,1.15-s*.2,s);
   }}

  // globe + arcs
  globe.rotation.y+=dt*0.25;
  halo.rotation.y=globe.rotation.y;
  // deliberate flash every GLOBE_FLASH_EVERY seconds: fresh arc + emissive pulse
  globeFlashTimer+=dt;
  if(globeFlashTimer>=GLOBE_FLASH_EVERY){globeFlashTimer=0;globeFlash=1;spawnArc(...randomTxPair());}
  globeFlash=Math.max(0,globeFlash-dt/0.6);
  globe.material.emissiveIntensity=0.15+globeFlash*0.6;
  halo.material.opacity=0.14+globeFlash*0.32;
  for(const a of arcPool){
    a.userData.t+=dt*1.1;
    a.rotation.y=globe.rotation.y;
    const t=a.userData.t;
    a.material.opacity=t<0.3?t/0.3:Math.max(0,1-(t-0.3)/1.2);
  }

  // textures
  drawLED();
  tmAccum+=dt;
  if(tmAccum>0.2){drawTelemetry();tmAccum=0;}

  // camera: damped fly-to between states + idle float + parallax
  const ct=camTarget(), ck=Math.min(1,dt*2.2);
  window._ck=ck; window._camCur=camCur; window._ct=ct;
  camCur.pos.lerp(ct.pos,ck); camCur.look.lerp(ct.look,ck);
  camCur.fov+=(ct.fov-camCur.fov)*ck;
  const ft=clock3.elapsedTime, pk=camState==='globe'?0.15:1;
  camera.position.set(
    camCur.pos.x+Math.sin(ft*0.4)*0.06+mx*0.5*pk,
    camCur.pos.y+Math.sin(ft*0.27)*0.05-my*0.4*pk,
    camCur.pos.z+Math.cos(ft*0.33)*0.04);
  camera.fov=camCur.fov; camera.updateProjectionMatrix();
  camera.lookAt(camCur.look);

  // Y2K monitor: glue the live iframe to the projected screen rect
  if(camState==='screen'){
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    for(let i=0;i<4;i++){
      _sn.set(i%2?0.775:-0.775, i<2?0.475:-0.475, 0);   // screen is 1.55 x 0.95
      emScreen.localToWorld(_sn); _sn.project(camera);
      const sx=(_sn.x+1)/2*innerWidth, sy=(1-_sn.y)/2*innerHeight;
      if(sx<minX)minX=sx; if(sx>maxX)maxX=sx;
      if(sy<minY)minY=sy; if(sy>maxY)maxY=sy;
    }
    const st=screenframe.style;
    st.left=minX+'px'; st.top=minY+'px';
    st.width=(maxX-minX)+'px'; st.height=(maxY-minY)+'px';
    if(camCur.pos.distanceTo(ct.pos)<0.09)screenframe.classList.add('show');
  }

  // MPC: the app presents as a large centered panel (like a real MPC taking over the screen);
  // the camera dive toward the unit is the transition. Aspect matches the app's faceplate.
  if(camState==='mpc'){
    const aspect=MPC_FW/MPC_FH;
    const w=Math.min(innerWidth*0.94, innerHeight*0.92*aspect), h=w/aspect;
    const st=mpcframe.style;
    st.left=Math.round((innerWidth-w)/2)+'px'; st.top=Math.round((innerHeight-h)/2)+'px';
    st.width=Math.round(w)+'px'; st.height=Math.round(h)+'px';
    if(camCur.pos.distanceTo(ct.pos)<0.3)mpcframe.classList.add('show');
  }

  // Arcade cabinet: same centered-panel treatment, 16:9 like the game canvas.
  if(camState==='arc'){
    const aspect=960/540;
    const w=Math.min(innerWidth*0.94, innerHeight*0.9*aspect), h=w/aspect;
    const st=arcframe.style;
    st.left=Math.round((innerWidth-w)/2)+'px'; st.top=Math.round((innerHeight-h)/2)+'px';
    st.width=Math.round(w)+'px'; st.height=Math.round(h)+'px';
    if(camCur.pos.distanceTo(ct.pos)<1.0)arcframe.classList.add('show');   // longer hall travel -> fade in on approach
  }

  composer.render();
}
loop();

/* ================================================================
   SELF-TEST  (#selftest)
   ================================================================ */
if(location.hash==='#selftest'){
  const A=(c,m)=>{if(!c)throw new Error('FAIL: '+m);};
  A(fmt(11500)==='11,500','fmt');
  const s0=game.score;game.score+=500;A(game.score===s0+500,'score');
  game.state='playing';game.balls=3;drain();A(game.balls===2,'drain');
  game.balls=1;drain();A(game.state==='over','game over');
  startGame();A(game.state==='playing'&&game.score===0&&game.balls===3,'reset');
  const n0=arcPool.length;spawnArc(...randomTxPair());A(arcPool.length===Math.min(n0+1,26),'arc spawn');
  const f0=stats.fans;fireTx();A(stats.fans>f0,'tx updates counters');
  A(arcUnits.length===9,'arcade units built');
  A(arcUnits.every(u=>u.face&&u.obj&&u.game),'arcade unit shape');
  A(new Set(arcUnits.map(u=>u.game)).size===8,'8 distinct games');
  A(!!CAMS.arcade,'arcade cam state');
  setCam('arcade');A(camState==='arcade','enter arcade');
  setCam('wide');A(camState==='wide','exit arcade');
  console.log('SELFTEST OK');
}
</script>
